<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wrangler</title>
  <link rel="icon" href="favicon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Program Wrangler</h1>
  </header>

  <!-- Config bar: spans all columns -->
  <div id="config-bar">

    <button id="btn-clear" class="btn-fade btn-danger btn-clear">Clear Everything</button>

    <div class="config-group">
      <span class="config-radio-heading">View:</span>
      <label class="config-radio-label"><input type="radio" name="view-mode" value="all" checked> All</label>
      <label class="config-radio-label"><input type="radio" name="view-mode" value="diff-rows"> Rows with differences</label>
      <label class="config-radio-label"><input type="radio" name="view-mode" value="diff-only"> Only differences</label>
    </div>



  </div>

  <!-- Column-mapping modal — shown after a BOM file is selected -->
  <div id="bom-modal" class="modal-overlay" hidden>
    <div class="modal-box">
      <div class="modal-header">
        <span>Map BOM Columns</span>
        <label class="modal-header-row-label">
          Header row:
          <input type="number" id="bom-header-row" value="1" min="1" max="999" title="Row number containing column headers">
        </label>
        <button id="btn-modal-close" class="btn-modal-icon">×</button>
      </div>
      <div class="modal-body">
        <table id="modal-mapping-table">
          <thead>
            <tr>
              <th>Column header</th>
              <th>Role</th>
            </tr>
          </thead>
          <tbody>
            <!-- Rows injected by app.js showMappingModal() -->
          </tbody>
        </table>
      </div>
      <div class="modal-footer">
        <button id="btn-modal-cancel">Cancel</button>
        <button id="btn-modal-confirm" class="btn-modal-primary">Import</button>
      </div>
    </div>
  </div>

  <!-- Full-table modal — shown when "View Full Table" is clicked on a panel -->
  <div id="table-modal" class="modal-overlay" hidden>
    <div class="modal-box modal-box-full">
      <div class="modal-header">
        <span id="table-modal-title">Full Table</span>
        <button id="btn-table-modal-close" class="btn-modal-icon">×</button>
      </div>
      <div class="modal-body table-modal-body" id="table-modal-body">
        <p class="table-modal-empty">(no data loaded)</p>
      </div>
    </div>
  </div>

  <!-- Comparison section — always visible, below panel area -->
  <div id="comparison-section">
    <div id="comparison-header">
      <span id="comparison-count"></span>
      <button id="btn-expand-all"  class="btn-fade btn-comparison-ctrl" hidden>Expand all</button>
      <button id="btn-collapse-all" class="btn-fade btn-comparison-ctrl" hidden>Collapse all</button>
      <input type="file" id="file-input-add" accept=".xlsx,.iss,.mmd" hidden>
      <button id="btn-add-file" class="btn-fade" title="Add a file to compare">+</button>
    </div>
    <div id="comparison-body">
    </div>
  </div>

  <!-- Full-viewport drag-and-drop overlay ring — shown while a file is dragged over the page -->
  <div id="drop-overlay" hidden></div>

  <script src="lib/xlsx.full.min.js"></script>
  <script src="parser.js"></script>
  <script src="juki-parser.js"></script>
  <script src="mmd-parser.js"></script>
  <script src="app.js"></script>
</body>
</html>
